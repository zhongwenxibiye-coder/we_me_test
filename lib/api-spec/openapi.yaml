        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
              required: [status]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeWorkSubmission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Humanities Quiz ───────────────────────────────────────
  /humanities/quiz/today:
    get:
      operationId: getTodayQuiz
      tags: [humanities-quizzes]
      summary: Get today's O/X quiz and attempt status
      parameters:
        - in: query
          name: sessionKey
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesQuizTodayResponse"

  /humanities/quiz/attempt:
    post:
      operationId: submitQuizAttempt
      tags: [humanities-quizzes]
      summary: Submit quiz attempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanitiesQuizAttemptInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesQuizAttempt"
        "409":
          description: Already attempted

  /humanities/quizzes:
    get:
      operationId: listHumanitiesQuizzes
      tags: [humanities-quizzes]
      summary: List all quizzes with stats (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HumanitiesQuizWithStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createHumanitiesQuiz
      tags: [humanities-quizzes]
      summary: Create quiz (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanitiesQuizInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesQuiz"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /humanities/quizzes/{id}:
    put:
      operationId: updateHumanitiesQuiz
      tags: [humanities-quizzes]
      summary: Update quiz (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanitiesQuizInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesQuiz"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteHumanitiesQuiz
      tags: [humanities-quizzes]
      summary: Delete quiz (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Humanities Articles ───────────────────────────────────
  /humanities/articles:
    get:
      operationId: listHumanitiesArticles
      tags: [humanities-articles]
      summary: List active humanities articles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HumanitiesArticle"
    post:
      operationId: createHumanitiesArticle
      tags: [humanities-articles]
      summary: Create article (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanitiesArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesArticle"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /humanities/articles/{id}:
    get:
      operationId: getHumanitiesArticle
      tags: [humanities-articles]
      summary: Get article detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesArticle"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateHumanitiesArticle
      tags: [humanities-articles]
      summary: Update article (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanitiesArticleInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanitiesArticle"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteHumanitiesArticle
      tags: [humanities-articles]
      summary: Delete article (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── Mentor Application ─────────────────────────────────
    MentorApplication:
      type: object
      properties:
        id:
          type: integer
        mentorId:
          type: string
        name:
          type: string
        contact:
          type: string
        topic:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [new, read]
        createdAt:
          type: string
          format: date-time
        readAt:
          type: ["string", "null"]
          format: date-time
      required: [id, mentorId, name, contact, topic, message, status, createdAt, readAt]

    # ── Mentor ─────────────────────────────────────────────
    MentorProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        major:
          type: string
        yearsOfExperience:
          type: integer
        photoUrl:
          type: ["string", "null"]
        headlineText:
          type: string
        sublineText:
          type: string
        bio:
          type: string
        avatarColor:
          type: string
        initial:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - major
        - yearsOfExperience
        - photoUrl
        - headlineText
        - sublineText
        - bio
        - avatarColor
        - initial
        - isActive
        - displayOrder
        - createdAt

    MentorProfileInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        major:
          type: string
          minLength: 1
        yearsOfExperience:
          type: integer
        photoUrl:
          type: ["string", "null"]
        headlineText:
          type: string
        sublineText:
          type: string
        bio:
          type: string
        avatarColor:
          type: string
        initial:
          type: string
          minLength: 1
        isActive:
          type: boolean
        displayOrder:
          type: integer
      required: [name, major, yearsOfExperience, initial]

    MentorDetail:
      allOf:
        - $ref: "#/components/schemas/MentorProfile"
        - type: object
          properties:
            articles:
              type: array
              items:
                $ref: "#/components/schemas/MentorArticle"
          required: [articles]

    # ── Mentor Article ─────────────────────────────────────
    MentorArticle:
      type: object
      properties:
        id:
          type: integer
        mentorId:
          type: integer
        title:
          type: string
        content:
          type: string
        displayOrder:
          type: integer
        isActive:
          type: boolean
      required: [id, mentorId, title, content, displayOrder, isActive]

    MentorArticleInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        displayOrder:
          type: integer
        isActive:
          type: boolean
      required: [title]

    # ── Job Listing ────────────────────────────────────────
    LearningItem:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required: [title, content]

    JobListing:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        title:
          type: string
        shortDescription:
          type: string
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        displayOrder:
          type: integer
        learning:
          type: array
          items:
            $ref: "#/components/schemas/LearningItem"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - category
        - title
        - shortDescription
        - imageUrl
        - isActive
        - displayOrder
        - learning
        - createdAt

    JobListingInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        shortDescription:
          type: string
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        displayOrder:
          type: integer
        learning:
          type: array
          items:
            $ref: "#/components/schemas/LearningItem"
      required: [category, title]

    # ── Startup Application ────────────────────────────────
    StartupApplication:
      type: object
      properties:
        id:
          type: integer
        founderName:
          type: string
        email:
          type: string
        registrationStatus:
          type: string
        startupIdea:
          type: string
        readiness:
          type: string
        readinessDetail:
          type: string
        ideaReason:
          type: string
        experience:
          type: string
        team:
          type: string
        result:
          type: ["string", "null"]
        resultReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - founderName
        - email
        - registrationStatus
        - startupIdea
        - readiness
        - readinessDetail
        - ideaReason
        - experience
        - team
        - result
        - resultReason
        - createdAt

    StartupApplicationPublic:
      type: object
      properties:
        id:
          type: integer
        founderName:
          type: string
        result:
          type: ["string", "null"]
        resultReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, founderName, result, resultReason, createdAt]

    # ── Creative Work ────────────────────────────────────────
    CreativeWork:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        title:
          type: string
        authorName:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, category, title, authorName, thumbnailUrl, displayOrder, isActive, createdAt]

    CreativeWorkInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        authorName:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        isActive:
          type: boolean
      required: [category, title]

    # ── Creative Episode ─────────────────────────────────────
    CreativeEpisode:
      type: object
      properties:
        id:
          type: integer
        workId:
          type: integer
        episodeNumber:
          type: integer
        title:
          type: string
        content:
          type: string
        images:
          type: array
          items:
            type: string
        isActive:
          type: boolean
      required: [id, workId, episodeNumber, title, content, images, isActive]

    CreativeEpisodeInput:
      type: object
      properties:
        episodeNumber:
          type: integer
        title:
          type: string
          minLength: 1
        content:
          type: string
        images:
          type: array
          items:
            type: string
        isActive:
          type: boolean
      required: [episodeNumber, title]

    # ── Creative Work Submission ──────────────────────────────
    CreativeWorkSubmission:
      type: object
      properties:
        id:
          type: integer
        authorName:
          type: string
        email:
          type: string
        description:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, authorName, email, description, status, createdAt]

    CreativeWorkSubmissionInput:
      type: object
      properties:
        authorName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 200
      required: [authorName, email, description]

    # ── Humanities Quiz ───────────────────────────────────────
    HumanitiesQuiz:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: boolean
        explanation:
          type: string
        scheduledDate:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, question, answer, explanation, scheduledDate, isActive, createdAt]

    HumanitiesQuizWithStats:
      allOf:
        - $ref: "#/components/schemas/HumanitiesQuiz"
        - type: object
          properties:
            participantCount:
              type: integer
            correctCount:
              type: integer
            correctRate:
              type: integer
          required: [participantCount, correctCount, correctRate]

    HumanitiesQuizInput:
      type: object
      properties:
        question:
          type: string
          minLength: 1
        answer:
          type: boolean
        explanation:
          type: string
        scheduledDate:
          type: ["string", "null"]
        isActive:
          type: boolean
      required: [question, answer]

    HumanitiesQuizTodayResponse:
      type: object
      properties:
        quiz:
          oneOf:
            - $ref: "#/components/schemas/HumanitiesQuizWithStats"
            - type: "null"
        attempt:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            quizId:
              type: integer
            sessionKey:
              type: string
            isCorrect:
              type: boolean
            attemptedAt:
              type: string
              format: date-time
      required: [quiz, attempt]

    HumanitiesQuizAttemptInput:
      type: object
      properties:
        quizId:
          type: integer
        sessionKey:
          type: string
        isCorrect:
          type: boolean
      required: [quizId, sessionKey, isCorrect]

    HumanitiesQuizAttempt:
      type: object
      properties:
        id:
          type: integer
        quizId:
          type: integer
        sessionKey:
          type: string
        isCorrect:
          type: boolean
        attemptedAt:
          type: string
          format: date-time
      required: [id, quizId, sessionKey, isCorrect, attemptedAt]

    # ── Job Category ─────────────────────────────────────────
    JobCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
      required: [id, name, isActive, displayOrder]

    JobCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        isActive:
          type: boolean
        displayOrder:
          type: integer
      required: [name]

    # ── Startup Post ──────────────────────────────────────────
    StartupPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        organizationName:
          type: string
        applicationUrl:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, title, content, organizationName, applicationUrl, startDate, endDate, isActive, displayOrder, createdAt]

    StartupPostInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        organizationName:
          type: string
        applicationUrl:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
      required: [title]

    # ── Humanities Article ────────────────────────────────────
    HumanitiesArticle:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        title:
          type: string
        contentType:
          type: string
        content:
          type: string
        cardPages:
          type: array
          items:
            type: string
        authorName:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, category, title, contentType, content, cardPages, authorName, imageUrl, isActive, displayOrder, createdAt]

    HumanitiesArticleInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        contentType:
          type: string
        content:
          type: string
        cardPages:
          type: array
          items:
            type: string
        authorName:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
      required: [category, title]
