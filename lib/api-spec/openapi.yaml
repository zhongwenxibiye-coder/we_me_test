  # ── Startup Applications ───────────────────────────────────
  /startup-applications:
    post:
      operationId: createStartupApplication
      tags: [startup-applications]
      summary: Submit a startup application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                founderName:
                  type: string
                  minLength: 1
                email:
                  type: string
                  minLength: 1
                registrationStatus:
                  type: string
                  minLength: 1
                startupIdea:
                  type: string
                  minLength: 1
                readiness:
                  type: string
                  minLength: 1
                readinessDetail:
                  type: string
                  default: ""
                ideaReason:
                  type: string
                  minLength: 1
                experience:
                  type: string
                  minLength: 1
                team:
                  type: string
                  minLength: 1
              required:
                - founderName
                - email
                - registrationStatus
                - startupIdea
                - readiness
                - ideaReason
                - experience
                - team
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupApplication"
    get:
      operationId: listStartupApplications
      tags: [startup-applications]
      summary: List startup applications (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StartupApplication"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /startup-applications/{id}/result:
    patch:
      operationId: updateStartupApplicationResult
      tags: [startup-applications]
      summary: Set result for a startup application (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: string
                  enum: [도전가능, 도전불가능]
                resultReason:
                  type: string
                  default: ""
              required: [result]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupApplication"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /startup-applications/{id}:
    get:
      operationId: getStartupApplication
      tags: [startup-applications]
      summary: Get a startup application by id (public – for applicant result view)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
