          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateMentor
      tags: [mentors]
      summary: Update a mentor (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorProfileInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMentor
      tags: [mentors]
      summary: Delete a mentor (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
