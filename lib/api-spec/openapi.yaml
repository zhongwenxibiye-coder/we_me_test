openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: mentor-applications
  - name: mentors
  - name: mentor-articles
  - name: job-listings
  - name: job-categories
  - name: startup-applications
  - name: startup-posts
  - name: creative-works
  - name: creative-episodes
  - name: creative-work-submissions
  - name: humanities-quizzes
  - name: humanities-articles
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Mentor Applications ────────────────────────────────────
  /mentor-applications:
    post:
      operationId: createMentorApplication
      tags: [mentor-applications]
      summary: Submit a new mentoring application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mentorId:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                contact:
                  type: string
                  minLength: 1
                topic:
                  type: string
                  minLength: 1
                message:
                  type: string
                  minLength: 100
              required: [mentorId, name, contact, topic, message]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorApplication"
    get:
      operationId: listMentorApplications
      tags: [mentor-applications]
      summary: List all mentoring applications (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorApplication"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /mentor-applications/{id}/status:
    patch:
      operationId: updateMentorApplicationStatus
      tags: [mentor-applications]
      summary: Update application status (admin)
      parameters:
        - in: header
          name: x-admin-password
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [new, read]
              required: [status]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorApplication"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Mentors ────────────────────────────────────────────────
  /mentors:
    get:
