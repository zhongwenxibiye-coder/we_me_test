kind = "web"
previewPath = "/"
title = "위미 - 인문계 진로 멘토링"
version = "1.0.0"
id = "artifacts/wemi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24462

[services.development]
run = "pnpm --filter @workspace/wemi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wemi", "run", "build" ]
publicDir = "artifacts/wemi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24462"
BASE_PATH = "/"
